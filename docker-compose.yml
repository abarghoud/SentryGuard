services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tesla-guard-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kafka (KRaft mode - no Zookeeper required)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:4.1.1
    container_name: tesla-guard-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Fleet Telemetry (receives telemetry from Tesla vehicles)
  # ---------------------------------------------------------------------------
  # The listening port is defined inside FLEET_TELEMETRY_CONFIG_B64 (default: 443).
  # Make sure the exposed port matches the port in your config.
  fleet-telemetry:
    build:
      context: ./fleet-telemetry
      args:
        TARGETPLATFORM: linux/amd64
    container_name: tesla-guard-fleet-telemetry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${FLEET_TELEMETRY_PORT:-4443}:${FLEET_TELEMETRY_PORT:-4443}"
    environment:
      FLEET_TELEMETRY_CONFIG_B64: ${FLEET_TELEMETRY_CONFIG_B64}
      FLEET_TELEMETRY_SERVER_CERT_B64: ${FLEET_TELEMETRY_SERVER_CERT_B64}
      FLEET_TELEMETRY_SERVER_KEY_B64: ${FLEET_TELEMETRY_SERVER_KEY_B64}
      FLEET_TELEMETRY_CA_FILE_B64: ${FLEET_TELEMETRY_CA_FILE_B64:-}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Vehicle Command Proxy (sends commands to Tesla vehicles)
  # ---------------------------------------------------------------------------
  vehicle-command-proxy:
    build:
      context: ./vehicle-command-proxy
      args:
        TARGETPLATFORM: linux/amd64
    container_name: tesla-guard-vehicle-command-proxy
    ports:
      - "${VEHICLE_COMMAND_PORT:-4444}:${VEHICLE_COMMAND_PORT:-4444}"
    environment:
      VEHICLE_COMMAND_TLS_KEY_B64: ${VEHICLE_COMMAND_TLS_KEY_B64}
      VEHICLE_COMMAND_TLS_CERT_B64: ${VEHICLE_COMMAND_TLS_CERT_B64}
      VEHICLE_COMMAND_PRIVATE_KEY_B64: ${VEHICLE_COMMAND_PRIVATE_KEY_B64}
      VEHICLE_COMMAND_PORT: ${VEHICLE_COMMAND_PORT:-4444}
      VEHICLE_COMMAND_VERBOSE: ${VEHICLE_COMMAND_VERBOSE:-false}
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Message Producer (development only - generates mock Sentry Mode events)
  # ---------------------------------------------------------------------------
  message-producer:
    image: apache/kafka:4.1.1
    container_name: tesla-guard-producer
    depends_on:
      kafka:
        condition: service_healthy
    profiles:
      - dev
    command: >
      bash -c "
        echo '🚀 Tesla Fleet API message producer started'
        while true; do
          # Generate a realistic Tesla VIN
          VIN_PREFIXES=('5YJ3E1EA' '5YJ3E1EB' '5YJ3E1EC' '5YJ3E1FA' '5YJ3E1FB')
          VIN_PREFIX=$${VIN_PREFIXES[$$(shuf -i 0-4 -n 1)]}
          VIN_SUFFIX=$$(shuf -i 100000-999999 -n 1)
          VIN=$${VIN_PREFIX}$${VIN_SUFFIX}

          # Determine if this is a sentry alert (30% chance)
          IS_SENTRY_ALERT=$$(shuf -i 0-9 -n 1)
          if [ \"$${IS_SENTRY_ALERT}\" -lt 3 ]; then
            SENTRY_STATE='SentryModeStateAware'
            EVENT_DESC='🚨 Sentry alert detected'
          else
            STATES=('SentryModeStateArmed' 'SentryModeStateOff' 'SentryModeStateIdle')
            SENTRY_STATE=$${STATES[$$(shuf -i 0-2 -n 1)]}
            EVENT_DESC='📊 Sentry state updated'
          fi

          MESSAGE='{
            \"vin\": \"'$VIN'\",
            \"createdAt\": \"'$$(date -u +%Y-%m-%dT%H:%M:%SZ)'\",
            \"isResend\": false,
            \"data\": [
              {
                \"key\": \"SentryMode\",
                \"value\": {
                  \"sentryModeStateValue\": \"'$SENTRY_STATE'\"
                }
              }
            ]
          }'

          echo \"📤 $${EVENT_DESC} - VIN: $$VIN - State: $$SENTRY_STATE\"

          echo \"$$MESSAGE\" | /opt/kafka/bin/kafka-console-producer.sh \\
            --bootstrap-server kafka:29092 \\
            --topic ${KAFKA_TOPIC:-FleetTelemetry_V} \\
            --property \"key.separator=:\" \\
            --property \"parse.key=true\"

          sleep $$(shuf -i 20-40 -n 1)
        done
      "

volumes:
  postgres_data: