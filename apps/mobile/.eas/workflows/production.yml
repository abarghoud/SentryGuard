name: Mobile Production Releases
on:
  push:
    tags:
      - 'v*'

jobs:
  build_android:
    name: Build Android (Production)
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS (Production)
    type: build
    params:
      platform: ios
      profile: production

  submit_android:
    name: Submit Android to Production
    type: submit
    needs: [build_android]
    params:
      platform: android
      profile: production
      build_id: ${{ needs.build_android.outputs.build_id }}

  submit_ios:
    name: Submit iOS to App Store
    type: submit
    needs: [build_ios]
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build_ios.outputs.build_id }}
