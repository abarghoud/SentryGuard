# .eas/workflows/preview.yml
name: Mobile Preview Builds

on:
  push:
    branches:
      - main
      - testing

defaults:
  tools:
    corepack: true

jobs:
  build_android:
    name: Build Android (Preview)
    type: build
    params:
      platform: android
      profile: preview

  build_ios:
    name: Build iOS (Preview)
    type: build
    params:
      platform: ios
      profile: preview

  submit_android:
    name: Submit Android to Internal Track
    type: submit
    needs: [build_android]
    params:
      platform: android
      profile: preview
      build_id: ${{ needs.build_android.outputs.build_id }}

  submit_ios:
    name: Submit iOS to TestFlight
    type: submit
    needs: [build_ios]
    params:
      platform: ios
      profile: production
      build_id: ${{ needs.build_ios.outputs.build_id }}
