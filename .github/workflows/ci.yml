name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      # Enables the Nx Cloud distributed cache when the secret is set.
      # Tasks still run normally if it is absent (just without remote caching).
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Enable Corepack for Yarn Berry support
      - name: Enable Corepack
        run: corepack enable

      # Configure Node.js and Yarn cache
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      # Install dependencies with Yarn
      - run: yarn install --frozen-lockfile

      # Run linting on all projects
      - name: Lint
        run: yarn nx run-many -t lint

      # Typecheck the mobile app (scoped: not every project is typecheck-clean yet)
      - name: Typecheck (mobile)
        run: yarn nx typecheck mobile

      # Run tests on all projects (api, webapp, mobile, domains)
      - name: Test
        run: yarn nx run-many -t test --skip-nx-cache

      # Build all projects (mobile excluded — requires Android SDK/EAS)
      - name: Build
        run: yarn nx run-many -t build --projects=!mobile

      # Verify the mobile JS bundle (Metro) compiles for all platforms.
      - name: Export mobile JS bundle
        run: yarn nx run-many -t export
