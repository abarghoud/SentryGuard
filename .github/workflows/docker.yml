name: Build & Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
            image_suffix: api
          - app: webapp
            dockerfile: apps/webapp/Dockerfile
            image_suffix: webapp
          - app: fleet-telemetry
            dockerfile: fleet-telemetry/Dockerfile
            image_suffix: fleet-telemetry
          - app: vehicle-command
            dockerfile: vehicle-command-proxy/Dockerfile
            image_suffix: vehicle-command
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        if: matrix.app == 'api' || matrix.app == 'webapp'
        run: corepack enable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ matrix.image_suffix }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
